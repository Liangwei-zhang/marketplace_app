<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <title>Forgot Password - Marketplace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Reset Password</h1>
            
            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" name="email" required placeholder="Enter your email">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Send Reset Link
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 16px;">
                <a href="login.html" style="color: var(--accent);">← Back to Login</a>
            </p>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = e.target.email.value;
            const btn = e.target.querySelector('button');
            btn.textContent = 'Sending...';
            btn.disabled = true;
            
            try {
                const result = await requestPasswordReset(email);
                showToast('If the email exists, a reset link will be sent', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.textContent = 'Send Reset Link';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
