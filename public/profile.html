<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Marketplace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Market<span>place</span></a>
                <div class="header-actions">
                    <button class="btn btn-outline" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="container main-content">
        <!-- Profile Header -->
        <div class="card" style="padding: 24px; text-align: center; margin-bottom: 24px;">
            <div style="position: relative; width: 80px; height: 80px; margin: 0 auto 16px;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 600;" id="avatarInitial">
                    ?
                </div>
                <img id="avatarImg" style="display: none; width: 80px; height: 80px; border-radius: 50%; object-fit: cover; position: absolute; top: 0; left: 0;">
                <label for="avatarInput" style="position: absolute; bottom: 0; right: 0; width: 28px; height: 28px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px;">
                    📷
                </label>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            </div>
            <h2 id="profileName">Loading...</h2>
            <p style="color: var(--text-secondary);" id="profileEmail"></p>
        </div>
        
        <!-- My Items -->
        <h3 class="page-title">My Items</h3>
        <div id="myItems">
            <div class="loading"><div class="spinner"></div></div>
        </div>
        
        <!-- Edit Profile -->
        <h3 class="page-title" style="margin-top: 32px;">Edit Profile</h3>
        <form id="profileForm" class="card" style="padding: 16px;">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" name="fullName">
            </div>
            
            <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-input" name="phone">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Save Changes</button>
        </form>
        
        <!-- Reviews -->
        <h3 class="page-title" style="margin-top: 32px;">My Reviews</h3>
        <div id="reviewStats" style="margin-bottom: 16px;"></div>
        <div id="reviewList">
            <div class="loading"><div class="spinner"></div></div>
        </div>
        
        <!-- Settings -->
        <h3 class="page-title" style="margin-top: 32px;">Settings</h3>
        <div class="card" style="padding: 16px;">
            <a href="stats.html" class="btn btn-outline" style="width: 100%; margin-bottom: 8px;">
                📊 My Stats
            </a>
            <a href="forgot-password.html" class="btn btn-outline" style="width: 100%; margin-bottom: 8px;">
                🔑 Change Password
            </a>
        </div>
    </main>
    
    <script src="js/app.js"></script>
    <script>
        if (!requireAuth()) {}
        
        async function loadProfile() {
            try {
                const user = await getMe();
                
                // Update UI
                document.getElementById('profileName').textContent = user.full_name || user.username;
                document.getElementById('profileEmail').textContent = user.email;
                
                // Avatar
                if (user.avatar_url) {
                    document.getElementById('avatarInitial').style.display = 'none';
                    document.getElementById('avatarImg').src = user.avatar_url;
                    document.getElementById('avatarImg').style.display = 'block';
                } else {
                    document.getElementById('avatarInitial').textContent = (user.username || '?').charAt(0).toUpperCase();
                }
                
                // Fill form
                document.querySelector('[name="fullName"]').value = user.full_name || '';
                document.querySelector('[name="phone"]').value = user.phone || '';
                
                // Load my items
                const items = await getItems(null, 100, 0);
                const myItems = items.filter(item => item.seller_id === user.id);
                
                if (myItems.length === 0) {
                    document.getElementById('myItems').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📦</div>
                            <p>No items yet</p>
                            <a href="publish.html" class="btn btn-accent" style="margin-top: 16px;">Sell something</a>
                        </div>
                    `;
                    return;
                }
                
                document.getElementById('myItems').innerHTML = `
                    <div class="items-grid">
                        ${myItems.map(item => {
                            const images = Array.isArray(item.images) ? item.images : [];
                            const imageUrl = images.length > 0 ? images[0] : null;
                            const statusClass = item.status === 0 ? 'available' : item.status === 1 ? 'reserved' : 'sold';
                            const statusText = item.status === 0 ? 'Available' : item.status === 1 ? 'Reserved' : 'Sold';
                            
                            return `
                                <a href="item.html?id=${item.id}" class="card item-card">
                                    ${imageUrl 
                                        ? `<img src="${imageUrl}" alt="${item.title}" class="item-image">`
                                        : '<div class="item-image-placeholder">📷</div>'
                                    }
                                    <div class="item-info">
                                        <div class="item-price">${formatPrice(item.price)}</div>
                                        <div class="item-title">${item.title}</div>
                                        <div class="item-meta">
                                            <span class="item-status status-${statusClass}">${statusText}</span>
                                        </div>
                                    </div>
                                </a>
                            `;
                        }).join('')}
                    </div>
                `;
                
            } catch (err) {
                showToast(err.message, 'error');
            }
        }
        
        // Update profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const btn = e.target.querySelector('button');
            btn.textContent = 'Saving...';
            btn.disabled = true;
            
            try {
                await updateProfile({
                    full_name: formData.fullName,
                    phone: formData.phone
                });
                
                showToast('Profile updated!', 'success');
                await loadProfile();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.textContent = 'Save Changes';
                btn.disabled = false;
            }
        });
        
        // Load reviews
        async function loadReviews() {
            try {
                const user = await getMe();
                const [stats, reviews] = await Promise.all([
                    getReviewStats(user.id),
                    getUserReviews(user.id)
                ]);
                
                // Show stats
                document.getElementById('reviewStats').innerHTML = `
                    <div class="card" style="padding: 16px; display: flex; align-items: center; gap: 16px;">
                        <div style="font-size: 32px; font-weight: 700; color: var(--accent);">
                            ${stats.avg_rating}
                        </div>
                        <div>
                            <div style="color: var(--text-secondary);">⭐ ${stats.avg_rating} (${stats.total_reviews} reviews)</div>
                        </div>
                    </div>
                `;
                
                if (reviews.length === 0) {
                    document.getElementById('reviewList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">⭐</div>
                            <p>No reviews yet</p>
                        </div>
                    `;
                    return;
                }
                
                document.getElementById('reviewList').innerHTML = reviews.map(review => `
                    <div class="card" style="padding: 12px; margin-bottom: 8px;">
                        <div style="display: flex; justify-content: space-between;">
                            <div style="font-weight: 500;">${review.reviewer_name || 'Anonymous'}</div>
                            <div>${'⭐'.repeat(review.rating)}</div>
                        </div>
                        ${review.content ? `<div style="margin-top: 8px; color: var(--text-secondary);">${review.content}</div>` : ''}
                        <div style="margin-top: 8px; font-size: 12px; color: var(--text-secondary);">
                            ${formatDate(review.created_at)}
                        </div>
                    </div>
                `).join('');
                
            } catch (err) {
                console.error('Load reviews error:', err);
            }
        }
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            logout();
        });
        
        // Avatar upload
        document.getElementById('avatarInput')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                const compressed = await compressImage(file, 200, 0.8);
                const base64 = await fileToBase64(compressed);
                const blob = await (await fetch(base64)).blob();
                const mockFile = new File([blob], 'avatar.jpg', { type: 'image/jpeg' });
                
                const result = await uploadAvatar(mockFile);
                showToast('Avatar updated!', 'success');
                await loadProfile();
            } catch (err) {
                showToast('Upload failed: ' + err.message, 'error');
            }
        });
        
        loadProfile();
        loadReviews();
    </script>
</body>
</html>
