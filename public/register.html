<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Marketplace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Create Account</h1>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" name="username" required minlength="3">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" name="email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" name="fullName">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" name="password" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Sign Up
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 16px; color: var(--text-secondary);">
                Already have an account? 
                <a href="login.html" style="color: var(--accent);">Login</a>
            </p>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        if (isLoggedIn()) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const btn = e.target.querySelector('button');
            btn.textContent = 'Creating account...';
            btn.disabled = true;
            
            try {
                await register(
                    formData.username,
                    formData.email,
                    formData.password,
                    formData.fullName
                );
                
                showToast('Account created! Please login.', 'success');
                window.location.href = 'login.html';
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.textContent = 'Sign Up';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
