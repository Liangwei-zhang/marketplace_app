<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <title>Chats - Marketplace</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Market<span>place</span></a>
                <div class="header-actions">
                    <a href="index.html" class="btn btn-outline">Home</a>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="container main-content">
        <h1 class="page-title">My Chats</h1>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="chats">Chats</button>
            <button class="tab" data-tab="transactions">Transactions</button>
        </div>
        
        <!-- Chat List -->
        <div id="chatList">
            <div class="loading"><div class="spinner"></div></div>
        </div>
        
        <!-- Transaction List -->
        <div id="transactionList" style="display: none;"></div>
    </main>
    
    <script src="/static/js/app.js"></script>
    <script>
        if (!requireAuth()) {}
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelector('.tab.active').classList.remove('active');
                tab.classList.add('active');
                
                document.getElementById('chatList').style.display = 
                    tab.dataset.tab === 'chats' ? 'block' : 'none';
                document.getElementById('transactionList').style.display = 
                    tab.dataset.tab === 'transactions' ? 'block' : 'none';
                
                if (tab.dataset.tab === 'transactions') {
                    loadTransactions();
                }
            });
        });
        
        // Check for room parameter (from item page)
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        
        if (roomId) {
            window.location.href = `chat-room.html?room=${roomId}`;
        }
        
        // Load chat rooms
        async function loadChats() {
            try {
                const rooms = await getChatRooms();
                
                if (rooms.length === 0) {
                    document.getElementById('chatList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <p>No chats yet</p>
                            <a href="index.html" class="btn btn-accent" style="margin-top: 16px;">Browse items</a>
                        </div>
                    `;
                    return;
                }
                
                const currentUser = await getMe();
                
                document.getElementById('chatList').innerHTML = rooms.map(room => {
                    const otherName = room.other_user_name || 'Unknown';
                    const initial = otherName.charAt(0).toUpperCase();
                    
                    return `
                        <a href="chat-room.html?room=${room.id}" class="chat-room-item card" style="display: flex; text-decoration: none; color: inherit; margin-bottom: 8px;">
                            <div class="chat-avatar">${initial}</div>
                            <div class="chat-content">
                                <div class="chat-name">${otherName}</div>
                                <div class="chat-preview">${room.item_title || 'Item'}</div>
                                <div style="display: flex; justify-content: space-between;">
                                    <div class="chat-preview" style="color: var(--accent);">${formatPrice(room.item_price)}</div>
                                    <div class="chat-time">${room.last_message_time ? formatDate(room.last_message_time) : ''}</div>
                                </div>
                            </div>
                            ${room.unread_count > 0 ? `
                                <div style="background: var(--danger); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px;">
                                    ${room.unread_count}
                                </div>
                            ` : ''}
                        </a>
                    `;
                }).join('');
                
            } catch (err) {
                document.getElementById('chatList').innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
            }
        }
        
        // Load transactions
        async function loadTransactions() {
            try {
                const [buyerTrans, sellerTrans] = await Promise.all([
                    getMyTransactions('buyer'),
                    getMyTransactions('seller')
                ]);
                
                const allTrans = [...buyerTrans, ...sellerTrans];
                
                if (allTrans.length === 0) {
                    document.getElementById('transactionList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <p>No transactions yet</p>
                        </div>
                    `;
                    return;
                }
                
                document.getElementById('transactionList').innerHTML = allTrans.map(trans => {
                    const statusClass = trans.status === 'pending' ? 'pending' : 
                        trans.status === 'confirmed' ? 'confirmed' : 
                        trans.status === 'completed' ? 'completed' : 'cancelled';
                    
                    return `
                        <div class="card transaction-card" style="margin-bottom: 12px;">
                            <div style="display: flex; justify-content: space-between;">
                                <div>
                                    <div style="font-weight: 600;">Item #${trans.item_id}</div>
                                    <div class="transaction-status transaction-${statusClass}">${trans.status}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div class="item-price">${formatPrice(trans.agreed_price)}</div>
                                    <div style="font-size: 12px; color: var(--text-secondary);">
                                        ${formatDate(trans.created_at)}
                                    </div>
                                </div>
                            </div>
                            
                            ${trans.status === 'pending' ? `
                                <div style="margin-top: 12px; display: flex; gap: 8px;">
                                    <button class="btn btn-success btn-sm" onclick="handleTransaction('${trans.status}', ${trans.id})">
                                        Confirm
                                    </button>
                                    <button class="btn btn-danger btn-sm" onclick="cancelTrans(${trans.id})">
                                        Cancel
                                    </button>
                                </div>
                            ` : ''}
                            
                            ${trans.status === 'confirmed' ? `
                                <div style="margin-top: 12px;">
                                    <button class="btn btn-success btn-sm" style="width: 100%;" onclick="completeTrans(${trans.id})">
                                        Mark as Completed
                                    </button>
                                </div>
                            ` : ''}
                            
                            ${trans.status === 'completed' ? `
                                <div style="margin-top: 12px;">
                                    <button class="btn btn-outline btn-sm" style="width: 100%;" onclick="openReviewModal(${trans.id})">
                                        ⭐ Leave Review
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
                
            } catch (err) {
                document.getElementById('transactionList').innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
            }
        }
        
        // Review modal
        function openReviewModal(transactionId) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay active';
            modal.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h3 class="modal-title">Leave a Review</h3>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">Rating</label>
                            <div style="display: flex; gap: 8px;">
                                ${[1,2,3,4,5].map(n => `
                                    <button type="button" class="btn btn-outline" onclick="selectRating(${n})" id="rating-${n}">
                                        ${'⭐'.repeat(n)}
                                    </button>
                                `).join('')}
                            </div>
                            <input type="hidden" id="reviewRating" value="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Review (optional)</label>
                            <textarea class="form-textarea" id="reviewContent" placeholder="Share your experience..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                        <button class="btn btn-accent" onclick="submitReview(${transactionId})">Submit Review</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        window.selectRating = function(n) {
            document.querySelectorAll('[id^="rating-"]').forEach((btn, i) => {
                btn.classList.toggle('active', i < n);
            });
            document.getElementById('reviewRating').value = n;
        };
        
        window.submitReview = async function(transactionId) {
            const rating = parseInt(document.getElementById('reviewRating').value);
            const content = document.getElementById('reviewContent').value;
            
            if (rating === 0) {
                showToast('Please select a rating', 'error');
                return;
            }
            
            try {
                await createReview(transactionId, rating, content);
                showToast('Review submitted!', 'success');
                document.querySelector('.modal-overlay').remove();
                loadTransactions();
            } catch (err) {
                showToast(err.message, 'error');
            }
        };
        
        async function handleTransaction(status, id) {
            try {
                await confirmTransaction(id);
                showToast('Transaction confirmed!', 'success');
                loadTransactions();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }
        
        async function completeTrans(id) {
            try {
                await completeTransaction(id);
                showToast('Transaction completed!', 'success');
                loadTransactions();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }
        
        async function cancelTrans(id) {
            if (!confirm('Cancel this transaction?')) return;
            
            try {
                await cancelTransaction(id);
                showToast('Transaction cancelled', 'success');
                loadTransactions();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }
        
        loadChats();
    </script>
    
    <!-- Nav -->
    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="favorites.html" class="nav-item">
            <span class="nav-icon">❤️</span>
            <span>Favorites</span>
        </a>
        <a href="history.html" class="nav-item">
            <span class="nav-icon">👀</span>
            <span>History</span>
        </a>
        <a href="chat.html" class="nav-item active">
            <span class="nav-icon">💬</span>
            <span>Chat</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>
</body>
</html>
