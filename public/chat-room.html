<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Marketplace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="chat.html" class="btn btn-outline">← Back</a>
                <div style="flex: 1; text-align: center;">
                    <div style="font-weight: 600;" id="chatName">Loading...</div>
                    <div style="font-size: 12px; color: var(--text-secondary);" id="chatStatus">Connecting...</div>
                </div>
                <div style="width: 60px;"></div>
            </div>
        </div>
    </header>
    
    <!-- Chat Area -->
    <main class="container main-content" style="padding-top: 16px;">
        <!-- Item Info -->
        <div class="card" style="padding: 12px; margin-bottom: 16px;" id="itemInfo">
            <div class="loading"><div class="spinner"></div></div>
        </div>
        
        <!-- Messages -->
        <div class="messages-container" id="messagesContainer">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </main>
    
    <!-- Message Input -->
    <div class="message-input-container" style="position: fixed; bottom: 60px; left: 0; right: 0;">
        <label for="imageInput" class="btn btn-outline" style="padding: 10px;">📷</label>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
        <button class="btn btn-accent" id="sendBtn">Send</button>
    </div>
    
    <!-- Nav -->
    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="chat.html" class="nav-item active">
            <span class="nav-icon">💬</span>
            <span>Chat</span>
        </a>
        <a href="publish.html" class="nav-item">
            <span class="nav-icon">➕</span>
            <span>Sell</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>
    
    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        
        if (!room window.location.href = 'chat.html';
        }
        
        if (!requireAuth()) {}
        
       Id) {
            let currentUser = null;
        let ws = null;
        
        async function init() {
            try {
                currentUser = await getMe();
                
                // Load room info and messages
                const [rooms, messages] = await Promise.all([
                    getChatRooms(),
                    getMessages(roomId)
                ]);
                
                const room = rooms.find(r => r.id === parseInt(roomId));
                if (!room) {
                    document.getElementById('messagesContainer').innerHTML = '<div class="empty-state">Chat not found</div>';
                    return;
                }
                
                // Show item info
                document.getElementById('itemInfo').innerHTML = `
                    <div style="display: flex; gap: 12px;">
                        <div style="width: 60px; height: 60px; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                            ${room.item_image ? `<img src="${room.item_image}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">` : '📷'}
                        </div>
                        <div style="flex: 1;">
                            <div style="font-weight: 600;">${room.item_title || 'Item'}</div>
                            <div style="color: var(--accent);">${formatPrice(room.item_price)}</div>
                            <a href="item.html?id=${room.item_id}" style="font-size: 12px; color: var(--text-secondary);">View item →</a>
                        </div>
                    </div>
                `;
                
                // Set chat name
                document.getElementById('chatName').textContent = room.other_user_name || 'Chat';
                
                // Render messages
                renderMessages(messages);
                
                // Connect WebSocket
                connectWebSocket(
                    roomId,
                    handleWsMessage,
                    () => {
                        document.getElementById('chatStatus').textContent = 'Connected';
                        document.getElementById('chatStatus').style.color = 'var(--success)';
                    },
                    () => {
                        document.getElementById('chatStatus').textContent = 'Reconnecting...';
                        document.getElementById('chatStatus').style.color = 'var(--warning)';
                    }
                );
                
            } catch (err) {
                document.getElementById('messagesContainer').innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
            }
        }
        
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">No messages yet. Start the conversation!</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const isSent = msg.sender_id === currentUser.id;
                const content = msg.message_type === 'image' 
                    ? `<img src="${msg.content}" style="max-width: 200px; border-radius: 8px;">`
                    : `<div>${msg.content}</div>`;
                
                return `
                    <div class="message ${isSent ? 'message-sent' : 'message-received'}">
                        ${content}
                        <div class="message-time">${formatDate(msg.created_at)}</div>
                    </div>
                `;
            }).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }
        
        function handleWsMessage(data) {
            if (data.type === 'system') {
                return;
            }
            
            if (data.status === 'sent') {
                // Message confirmed, add to list
                const container = document.getElementById('messagesContainer');
                const msg = document.createElement('div');
                msg.className = 'message message-sent';
                msg.innerHTML = `
                    <div>${data.content}</div>
                    <div class="message-time">${formatDate(data.timestamp)}</div>
                `;
                container.appendChild(msg);
                container.scrollTop = container.scrollHeight;
                return;
            }
            
            // Received message
            const container = document.getElementById('messagesContainer');
            const msg = document.createElement('div');
            msg.className = 'message message-received';
            msg.innerHTML = `
                <div>${data.content}</div>
                <div class="message-time">${formatDate(data.timestamp)}</div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }
        
        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            // Try WebSocket first
            if (ws && ws.readyState === WebSocket.OPEN) {
                sendWsMessage(content);
            } else {
                // Fallback to HTTP
                try {
                    await sendMessage(roomId, content);
                    // Reload messages
                    const messages = await getMessages(roomId);
                    renderMessages(messages);
                } catch (err) {
                    showToast(err.message, 'error');
                }
            }
            
            input.value = '';
        }
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Image upload
        document.getElementById('imageInput')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                // Compress and upload
                const compressed = await compressImage(file, 800, 0.7);
                const base64 = await fileToBase64(compressed);
                
                // Send as image message via WebSocket or HTTP
                const imageUrl = await uploadImages([new File([compressed], 'image.jpg', { type: 'image/jpeg' })]);
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    sendWsMessage(imageUrl[0], 'image');
                } else {
                    await sendMessage(roomId, imageUrl[0], 'image');
                    const messages = await getMessages(roomId);
                    renderMessages(messages);
                }
                
                showToast('Image sent!', 'success');
            } catch (err) {
                showToast('Failed to send image: ' + err.message, 'error');
            }
            
            e.target.value = ''; // Reset input
        });
        
        // Heartbeat
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 30000);
        
        init();
    </script>
</body>
</html>
