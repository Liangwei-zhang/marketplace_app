<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <title>Item Details - Marketplace</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .item-detail-header {
            position: relative;
        }
        .item-detail-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .image-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-nav.prev { left: 10px; }
        .image-nav.next { right: 10px; }
        .image-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }
        .image-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
        }
        .image-dot.active {
            background: white;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Market<span>place</span></a>
                <div class="header-actions">
                    <a href="index.html" class="btn btn-outline">← Back</a>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="container main-content">
        <div id="itemDetail">
            <div class="loading"><div class="spinner"></div></div>
        </div>
        
        <!-- Actions (shown when logged in) -->
        <div id="itemActions" style="display: none;">
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-accent" style="flex: 1; margin-top: 16px;" id="wantBtn">
                    💬 I Want This
                </button>
                <button class="btn btn-outline" style="margin-top: 16px;" id="favoriteBtn" title="Add to favorites">
                    🤍
                </button>
            </div>
            
            <!-- For seller -->
            <div id="sellerActions" style="display: none; margin-top: 16px;">
                <a href="#" class="btn btn-outline" style="width: 100%;" id="editBtn">✏️ Edit</a>
                <button class="btn btn-danger" style="width: 100%; margin-top: 8px;" id="deleteBtn">🗑️ Delete</button>
            </div>
        </div>
        
        <!-- Transaction section -->
        <div id="transactionSection" style="display: none; margin-top: 24px;">
            <h3 class="page-title">Transaction</h3>
            <div id="transactionInfo"></div>
        </div>
    </main>
    
    <script src="/static/js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        
        let currentImageIndex = 0;
        let itemData = null;
        let currentUser = null;
        
        async function loadItem() {
            if (!itemId) {
                document.getElementById('itemDetail').innerHTML = '<div class="empty-state">Item not found</div>';
                return;
            }
            
            try {
                itemData = await getItem(itemId);
                renderItem(itemData);
                
                // Check if logged in
                if (isLoggedIn()) {
                    currentUser = await getMe();
                    showActions();
                }
                
            } catch (err) {
                document.getElementById('itemDetail').innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
            }
        }
        
        function renderItem(item) {
            const images = Array.isArray(item.images) ? item.images : [];
            const statusClass = item.status === 0 ? 'available' : item.status === 1 ? 'reserved' : 'sold';
            const statusText = item.status === 0 ? 'Available' : item.status === 1 ? 'Reserved' : 'Sold';
            
            document.getElementById('itemDetail').innerHTML = `
                <div class="item-detail-header">
                    ${images.length > 0 ? `
                        <img src="${images[0]}" alt="${item.title}" class="item-detail-image" id="mainImage">
                        ${images.length > 1 ? `
                            <button class="image-nav prev" onclick="prevImage()">‹</button>
                            <button class="image-nav next" onclick="nextImage()">›</button>
                            <div class="image-dots">
                                ${images.map((_, i) => `<span class="image-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></span>`).join('')}
                            </div>
                        ` : ''}
                    ` : `
                        <div class="item-image-placeholder" style="aspect-ratio: 1; font-size: 72px; border-radius: var(--radius-md);">📷</div>
                    `}
                </div>
                
                <div style="padding: 16px 0;">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <h1 style="font-size: 24px; font-weight: 700;">${item.title}</h1>
                            <div style="margin-top: 4px;">
                                <span class="item-status status-${statusClass}">${statusText}</span>
                                <span style="color: var(--text-secondary); margin-left: 8px;">${getCategoryLabel(item.category)}</span>
                            </div>
                        </div>
                        <div class="item-price" style="font-size: 28px;">${formatPrice(item.price)}</div>
                    </div>
                    
                    <div style="margin-top: 16px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm);">
                        <div style="font-size: 13px; color: var(--text-secondary);">📍 Location</div>
                        <div>${item.address || 'Calgary, AB'}</div>
                    </div>
                    
                    <div style="margin-top: 12px;">
                        <div style="font-size: 13px; color: var(--text-secondary);">📝 Description</div>
                        <div style="white-space: pre-wrap; margin-top: 4px;">${item.description}</div>
                    </div>
                    
                    <div style="margin-top: 12px; font-size: 12px; color: var(--text-secondary);">
                        👁️ ${item.view_count} views · ${formatDate(item.created_at)}
                    </div>
                </div>
            `;
            
            // Show images
            if (images.length > 0) {
                window.images = images;
            }
        }
        
        function showActions() {
            document.getElementById('itemActions').style.display = 'block';
            
            // Check if current user is the seller
            if (currentUser && itemData.seller_id === currentUser.id) {
                document.getElementById('wantBtn').style.display = 'none';
                document.getElementById('sellerActions').style.display = 'block';
                document.getElementById('favoriteBtn').style.display = 'none';
            } else if (itemData.status === 0) {
                document.getElementById('wantBtn').style.display = 'block';
                document.getElementById('favoriteBtn').style.display = 'block';
            } else {
                document.getElementById('wantBtn').style.display = 'none';
            }
            
            // Check favorite status
            checkFavoriteStatus();
        }
        
        async function checkFavoriteStatus() {
            try {
                const isFavorited = await checkFavorite(itemId);
                document.getElementById('favoriteBtn').innerHTML = isFavorited ? '❤️' : '🤍';
            } catch (err) {
                console.error('Check favorite error:', err);
            }
        }
        
        function prevImage() {
            if (!window.images) return;
            currentImageIndex = (currentImageIndex - 1 + window.images.length) % window.images.length;
            document.getElementById('mainImage').src = window.images[currentImageIndex];
            updateDots();
        }
        
        function nextImage() {
            if (!window.images) return;
            currentImageIndex = (currentImageIndex + 1) % window.images.length;
            document.getElementById('mainImage').src = window.images[currentImageIndex];
            updateDots();
        }
        
        function updateDots() {
            document.querySelectorAll('.image-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentImageIndex);
            });
        }
        
        // I Want This button
        document.getElementById('wantBtn')?.addEventListener('click', async () => {
            if (!requireAuth()) return;
            
            try {
                const room = await createChatRoom(itemData.id);
                showToast('Chat room created!', 'success');
                window.location.href = `chat.html?room=${room.id}`;
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
        
        // Favorite button
        document.getElementById('favoriteBtn')?.addEventListener('click', async () => {
            if (!requireAuth()) return;
            
            try {
                const isFavorited = await checkFavorite(itemId);
                if (isFavorited) {
                    await removeFavorite(itemId);
                    document.getElementById('favoriteBtn').innerHTML = '🤍';
                    showToast('Removed from favorites', 'success');
                } else {
                    await addFavorite(itemId);
                    document.getElementById('favoriteBtn').innerHTML = '❤️';
                    showToast('Added to favorites!', 'success');
                }
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
        
        // Edit button
        document.getElementById('editBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = `publish.html?edit=${itemId}`;
        });
        
        // Delete button
        document.getElementById('deleteBtn')?.addEventListener('click', async () => {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            try {
                await deleteItem(itemId);
                showToast('Item deleted', 'success');
                window.location.href = 'index.html';
            } catch (err) {
                showToast(err.message, 'error');
            }
        });
        
        loadItem();
    </script>
    
    <!-- Nav -->
    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="history.html" class="nav-item"><span class="nav-icon">👀</span><span>History</span></a>
        <a href="favorites.html" class="nav-item">
            <span class="nav-icon">❤️</span>
            <span>Favorites</span>
        </a>
        <a href="chat.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Chat</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </nav>
</body>
</html>
